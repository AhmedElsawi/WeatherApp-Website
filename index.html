<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300..800&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="./style.css">
    <script src="./script.js" defer></script>
</head>

<body>
<div class="container">
    <div class="card">

<div class="search">

    <input type="text" class="search-bar" placeholder="Search city...">

    <button class="search-btn">
        <svg stroke="currentColor" fill="currentColor" stroke-width="0"
        viewBox="0 0 512 512" height="1.5em" width="1em"
        xmlns="http://www.w3.org/2000/svg">
            <path d="M505.04 442.66l-99.71-99.69c-4.5-4.5-10.6-7-17-7h-16.3
            c27.6-35.3 44-79.69 44-127.99C416.03 93.09 322.92 0 208.02 0S0
            93.09 0 207.98s93.11 207.98 208.02 207.98c48.3 0 92.71-16.4
            128.01-44v16.3c0 6.4 2.5 12.5 7 17l99.71 99.69c9.4 9.4 24.6
            9.4 33.9 0l28.3-28.3c9.4-9.4 9.4-24.59.1-33.99z"></path>
        </svg>
    </button>

   
    <select class="unit-select">
        <option value="imperial">°F</option>
        <option value="metric">°C</option>
    </select>

</div>


        <div class="weather loading">

            <h2 class="city">Search for a city</h2>

            <h1 class="temp">--</h1>

            <div class="flex">
                <img src="" class="icon" />
                <div class="description">---</div>
            </div>

            <div class="humidity">Humidity: --</div>
            <div class="wind">Wind speed: --</div>

        </div>
    </div>

    <div class="forecast-card">
        <h2>Daily Forecast</h2>
        <div class="forecast-container"></div>
    </div>
</div>
</body>
</html>
